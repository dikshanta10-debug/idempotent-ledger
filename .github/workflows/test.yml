name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and start services
        run: |
          docker compose up -d --build
          # Wait for app to be healthy
          sleep 15

      - name: Run tests inside app container
        run: docker compose exec -T app pytest --cov=app --cov-report=term-missing --cov-fail-under=72